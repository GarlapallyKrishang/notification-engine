spring.application.name=notification-engine
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notification_engine}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# OpenAI
openai.api.key=${OPENAI_API_KEY:mock_key}

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.openai.slidingWindowSize=5
resilience4j.circuitbreaker.instances.openai.failureRateThreshold=50
resilience4j.circuitbreaker.instances.openai.waitDurationInOpenState=2m
resilience4j.circuitbreaker.instances.openai.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.openai.minimumNumberOfCalls=5
